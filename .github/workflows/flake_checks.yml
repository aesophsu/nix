name: Nix Flake Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Check expressions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Run Nix Flake Checks
        run: |
          echo 'Flake checks (eval only across all systems)'
          # Darwin derivations cannot be built on Ubuntu, but --no-build can still eval them.
          nix flake check --no-build --all-systems

          echo 'Linux executable checks'
          nix build --no-link .#checks.x86_64-linux.smoke-eval
          nix build --no-link .#checks.x86_64-linux.docs-sync
          nix build --no-link .#checks.x86_64-linux.pre-commit

          echo 'Bootstrap installer subflake checks (eval only)'
          nix flake check --no-build ./nixos-installer
          nix eval --raw ./nixos-installer#packages.x86_64-linux.shaka-manual-installer-iso.outPath > /dev/null

          echo 'docInventory'
          nix eval --json .#docInventory > /dev/null

          echo 'tracked secret audit'
          bash ./scripts/security/audit-secrets.sh
